<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaPipe 手势识别演示</title>
    <!-- 引入Material Design组件库的CSS和JS文件 -->
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>
    <style>
        /* 页面基础样式 */
        body {
            font-family: roboto;
            margin: 2em;
            color: #3d3d3d;
            --mdc-theme-primary: #007f8b; /* 主色调 */
            --mdc-theme-on-primary: #f1f3f4;
        }
        h1 {
            color: #007f8b;
        }
        h2 {
            clear: both;
        }
        /* 视频样式：水平翻转使其呈现镜像效果 */
        video {
            clear: both;
            display: block;
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            -moz-transform: rotateY(180deg);
            height: 280px;
        }
        /* 主内容区域样式 */
        section {
            opacity: 1;
            transition: opacity 500ms ease-in-out;
        }
        /* 隐藏元素 */
        .removed {
            display: none;
        }
        /* 不可见状态（加载中） */
        .invisible {
            opacity: 0.2;
        }
        /* 图片检测区域样式 */
        .detectOnClick {
            position: relative;
            float: left;
            width: 48%;
            margin: 2% 1%;
            cursor: pointer;
        }
        /* 实时视频区域样式 */
        .videoView {
            position: absolute;
            float: left;
            width: 48%;
            margin: 2% 1%;
            cursor: pointer;
            min-height: 500px;
        }
        /* 结果文字样式 */
        .videoView p,
        .detectOnClick p {
            padding-top: 5px;
            padding-bottom: 5px;
            background-color: #007f8b;
            color: #fff;
            border: 1px dashed rgba(255, 255, 255, 0.7);
            z-index: 2;
            margin: 0;
        }
        /* 高亮框样式（原示例中未使用但保留） */
        .highlighter {
            background: rgba(0, 255, 0, 0.25);
            border: 1px dashed #fff;
            z-index: 1;
            position: absolute;
        }
        /* 画布样式 */
        .canvas {
            z-index: 1;
            position: absolute;
            pointer-events: none; /* 避免画布阻挡图片点击事件 */
        }
        /* 输出画布同样需要水平翻转 */
        .output_canvas {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            -moz-transform: rotateY(180deg);
        }
        /* 图片检测区域字体响应式 */
        .detectOnClick {
            z-index: 0;
            font-size: calc(8px + 1.2vw);
        }
        /* 图片自适应宽度 */
        .detectOnClick img {
            width: 45vw;
        }
        /* 实时检测结果输出区域，默认隐藏 */
        .output {
            display: none;
            width: 100%;
            font-size: calc(8px + 1.2vw);
        }
        
        /* 新增：成功提示样式 */
        .success-message {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 5px;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <!-- 新增：成功提示 -->
    <div id="successMessage" class="success-message">
        检测到手掌手势！正在保存图片并跳转...
    </div>

    <h2>演示：摄像头连续手势检测</h2>
    <p>在摄像头前做出手势以获取分类结果。</br>点击下方的 <b>启用摄像头</b> 按钮，并根据提示允许访问摄像头。</p>

    <!-- 实时摄像头视图区域 -->
    <div id="liveView" class="videoView">
        <!-- 启用/禁用摄像头按钮 -->
        <button id="webcamButton" class="mdc-button mdc-button--raised">
            <span class="mdc-button__ripple"></span>
            <span class="mdc-button__label">启用摄像头</span>
        </button>
        <div style="position: relative;">
            <!-- 用于显示摄像头流的Video元素 -->
            <video id="webcam" autoplay playsinline></video>
            <!-- 用于绘制手部关键点和连接线的画布 -->
            <canvas class="output_canvas" id="output_canvas" width="1280" height="720" style="position: absolute; left: 0px; top: 0px;"></canvas>
            <!-- 实时检测结果输出区域 -->
            <p id='gesture_output' class="output"></p>
        </div>
    </div>

<script type="module">
    // 从CDN导入MediaPipe Tasks Vision库
    import {
        GestureRecognizer,  // 手势识别器
        FilesetResolver,    // 文件集解析器，用于加载WASM模块
        DrawingUtils        // 绘图工具
    } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

    // 获取DOM元素引用
    const demosSection = document.getElementById("demos");
    let gestureRecognizer;  // 手势识别器实例
    let runningMode = "VIDEO";  // 初始运行模式为图片模式
    let enableWebcamButton; // 摄像头按钮
    let webcamRunning = false;  // 摄像头运行状态
    const videoHeight = "360px";
    const videoWidth = "480px";
    
    // 手势检测状态变量
    let paperDetected = false;  // 防止重复触发
    let detectionTimeout = null;     // 用于清除定时器
    
    // 新增：成功提示元素
    const successMessage = document.getElementById("successMessage");

    // 创建手势识别器实例
    const createGestureRecognizer = async () => {
        // 1. 加载WASM运行时
        const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );
        // 2. 创建手势识别器
        gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
            baseOptions: {
                // 预训练模型路径
                modelAssetPath: "https://cdn.jsdelivr.net/gh/fishingNow/handgesture_recognize@main/gesture_recognizer_blend.task",
                delegate: "GPU"  // 使用GPU加速
            },
            numHands: 2,
            runningMode: runningMode
        });
        // 3. 模型加载完成后，显示演示区域
        if (demosSection) {
            demosSection.classList.remove("invisible");
        }
    };
    // 调用函数，开始创建手势识别器
    createGestureRecognizer();

    /********************************************************************
     * 保存当前帧图片的函数
     ********************************************************************/
    function captureAndSaveImage() {
        const canvas = document.getElementById("output_canvas");
        const video = document.getElementById("webcam");
        
        if (!canvas || !video) {
            console.error("未找到canvas或video元素");
            return;
        }
        
        try {
            // 创建一个临时canvas来保存图片
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            
            // 设置canvas尺寸
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            
            // 绘制当前帧（包括关键点和连接线）
            tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);
            
            // 将canvas转换为数据URL
            const imageDataUrl = tempCanvas.toDataURL('image/png');
            
            // 创建下载链接
            const downloadLink = document.createElement('a');
            downloadLink.href = imageDataUrl;
            downloadLink.download = 'gesture_capture_' + new Date().getTime() + '.png';
            
            // 触发下载
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            
            console.log("图片已保存");
            
        } catch (error) {
            console.error("保存图片时出错:", error);
        }
    }

    /********************************************************************
     * 检查是否检测到paper手势的函数
     ********************************************************************/
    function checkPaperGesture(gestures) {
        // 遍历所有检测到的手势
        for (let i = 0; i < gestures.length; i++) {
            if (gestures[i] && gestures[i][0]) {
                const gesture = gestures[i][0];
                // 检查是否为paper手势
                if (gesture.categoryName === 'paper') {
                    return true;
                }
            }
        }
        return false;
    }

    /********************************************************************
     * 处理检测成功函数
     ********************************************************************/
    function handlePaperDetection() {
        if (paperDetected) return; // 防止重复触发
        
        console.log("检测到paper手势！");
        
        // 显示成功提示
        successMessage.style.display = 'block';
        
        // 保存当前帧图片
        captureAndSaveImage();
        
        // 设置冷却标记
        paperDetected = true;
        
        // 2秒后执行跳转
        setTimeout(() => {
            // 跳转到指定网页
            window.location.href = 'file:///C:/Users/HW/Desktop/gesture_image_video.html';
        }, 2000);
        
        // 清除可能存在的旧定时器
        if (detectionTimeout) clearTimeout(detectionTimeout);
        
        // 5秒后重置检测状态
        detectionTimeout = setTimeout(() => {
            paperDetected = false;
            successMessage.style.display = 'none';
            console.log("检测冷却已重置");
        }, 5000);
    }

    /********************************************************************
     * 演示2：从摄像头连续获取图像并进行实时检测
     ********************************************************************/
    // 获取摄像头相关DOM元素
    const video = document.getElementById("webcam");
    const canvasElement = document.getElementById("output_canvas");
    const canvasCtx = canvasElement.getContext("2d");
    const gestureOutput = document.getElementById("gesture_output");

    // 检查浏览器是否支持getUserMedia API
    function hasGetUserMedia() {
        return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
    }
    // 如果支持，为按钮添加点击事件
    if (hasGetUserMedia()) {
        enableWebcamButton = document.getElementById("webcamButton");
        enableWebcamButton.addEventListener("click", enableCam);
    } else {
        console.warn("您的浏览器不支持getUserMedia()");
    }

    // 启用摄像头函数
    function enableCam(event) {
        if (!gestureRecognizer) {
            alert("请等待手势识别器加载完成");
            return;
        }
        // 切换摄像头运行状态
        if (webcamRunning === true) {
            webcamRunning = false;
            enableWebcamButton.children[1].innerText = "启用摄像头";
        } else {
            webcamRunning = true;
            enableWebcamButton.children[1].innerText = "禁用摄像头";
        }
        // 设置摄像头约束（仅视频）
        const constraints = { video: true };
        // 请求摄像头访问权限并获取视频流
        navigator.mediaDevices.getUserMedia(constraints).then(function (stream) {
            video.srcObject = stream; // 将视频流绑定到video元素
            video.addEventListener("loadeddata", predictWebcam); // 视频数据加载完成后开始预测
        });
    }

    // 用于视频预测的变量
    let lastVideoTime = -1; // 记录上一帧时间
    let results = undefined; // 存储识别结果
    
    // 主要的摄像头预测循环函数
    async function predictWebcam() {
        const webcamElement = document.getElementById("webcam");
        // 如果当前是图片模式，切换到视频模式
        if (runningMode === "IMAGE") {
            runningMode = "VIDEO";
            await gestureRecognizer.setOptions({ 
                runningMode: "VIDEO",
                numHands: 2 // 明确指定双手检测
            });
        }
        // 获取当前时间戳
        let nowInMs = Date.now();
        // 如果视频时间已更新，进行识别
        if (video.currentTime !== lastVideoTime) {
            lastVideoTime = video.currentTime;
            // 调用视频识别方法
            results = gestureRecognizer.recognizeForVideo(video, nowInMs);
        }
        // 保存画布上下文状态
        canvasCtx.save();
        // 清空画布
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        const drawingUtils = new DrawingUtils(canvasCtx);
        // 设置视频和画布的显示尺寸
        canvasElement.style.height = videoHeight;
        webcamElement.style.height = videoHeight;
        canvasElement.style.width = videoWidth;
        webcamElement.style.width = videoWidth;
        // 如果检测到手部关键点，进行绘制
        if (results && results.landmarks && results.landmarks.length > 0) {
            for (const landmarks of results.landmarks) {
                // 绘制手部连接线
                drawingUtils.drawConnectors(landmarks, GestureRecognizer.HAND_CONNECTIONS, {
                    color: "#00FF00",
                    lineWidth: 5
                });
                // 绘制手部关键点
                drawingUtils.drawLandmarks(landmarks, {
                    color: "#FF0000",
                    lineWidth: 2
                });
            }
        }
        // 恢复画布上下文状态
        canvasCtx.restore();
        // 如果有识别结果，显示手势信息
        if (results && results.gestures && results.gestures.length > 0) {
            gestureOutput.style.display = "block";
            gestureOutput.style.width = videoWidth;
            
            // 显示所有手的结果
            let outputText = '';
            for (let i = 0; i < results.gestures.length; i++) {
                if (results.handednesses[i] && results.handednesses[i][0] && 
                    results.gestures[i] && results.gestures[i][0]) {
                    const hand = results.handednesses[i][0];
                    const gesture = results.gestures[i][0];
                    
                    // 由于视频是镜像的，需要翻转左右手显示
                    const handedness = hand.categoryName === "Left" ? "右手" : "左手";
                    const score = (gesture.score * 100).toFixed(1);
                    
                    outputText += `${handedness}: ${gesture.categoryName} (${score}%)\n`;
                }
            }
            gestureOutput.innerText = outputText || "未识别到手势";
            
            // ============ 新增：检查是否检测到paper手势 ============
            if (results.gestures.length > 0 && !paperDetected) {
                const paperDetectedNow = checkPaperGesture(results.gestures);
                
                if (paperDetectedNow) {
                    handlePaperDetection();
                }
            }
            // ============ 新增结束 ============
            
        } else {
            gestureOutput.style.display = "none"; // 无手势时隐藏结果
        }
        // 如果摄像头仍在运行，则请求下一帧动画
        if (webcamRunning === true) {
            window.requestAnimationFrame(predictWebcam);
        }
    }
</script>
</html>
